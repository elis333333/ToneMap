<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToneMap — Clase</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
  :root {
  --bg: #050505;
  --panel: #121212;
  --panel-video: #2a2a30;
  --input: #232323;
  --text: #f4f4f4;
  --muted: #8e8e8e;

  --purple: #6f2bd9;
  --purple-2: #8338ec;
  --blue: #3a86ff;
  --pink: #ff006e;
  --green: #06d6a0;
  --yellow: #ffbe0b;

  --font-main: "Poppins", sans-serif;
  --font-secondary: "Space Grotesk", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
}

body {
  background: #000;
  color: var(--text);
  font-family: var(--font-main);
  overflow: hidden;
}

img {
  display: block;
  max-width: 100%;
}

button,
input {
  font: inherit;
}

a {
  color: inherit;
  text-decoration: none;
}

.page-shell {
  width: 100vw;
  height: 100vh;
  padding: 24px 36px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  background: #000;
  overflow: hidden;
}

/* TOPBAR */

.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  min-height: 72px;
  flex: 0 0 auto;
}

.brand-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  justify-self: start;
  min-width: 0;
}

.brand-title {
  margin: 0;
  font-size: 3.5rem;
  line-height: 0.94;
  font-weight: 800;
  letter-spacing: -0.07em;
  color: #f5f5f5;
}

.brand-logo {
  width: 52px;
  height: 52px;
  object-fit: contain;
}

.top-nav {
  display: flex;
  justify-content: center;
  gap: 56px;
  font-family: var(--font-secondary);
  font-size: 1rem;
}

.top-nav a {
  color: rgba(255, 255, 255, 0.78);
  text-decoration: underline;
  text-underline-offset: 5px;
}

.top-nav a.active {
  color: #fff;
}

/* MAIN */

.class-layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1.58fr) minmax(320px, 0.86fr);
  gap: 30px;
  align-items: stretch;
  overflow: hidden;
}

.lesson-panel-scroll {
  min-width: 0;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 8px;
}

.lesson-panel-scroll::-webkit-scrollbar {
  width: 8px;
}

.lesson-panel-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.14);
  border-radius: 999px;
}

.lesson-panel-scroll::-webkit-scrollbar-track {
  background: transparent;
}

.lesson-panel {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding-bottom: 10px;
}

.ai-card {
  min-width: 0;
  min-height: 0;
  background: #121212;
  border-radius: 34px;
  padding: 24px 22px 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}

/* VIDEO */

.video-card {
  flex: 0 0 auto;
}

.video-placeholder {
  width: 100%;
  aspect-ratio: 16 / 9;
  max-height: 420px;
  background: var(--panel-video);
  border-radius: 40px;
  position: relative;
  overflow: hidden;
}

.play-button {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 92px;
  height: 92px;
  border-radius: 50%;
  border: none;
  background: #ebebeb;
  display: grid;
  place-items: center;
  cursor: pointer;
}

.play-triangle {
  width: 0;
  height: 0;
  margin-left: 5px;
  border-top: 14px solid transparent;
  border-bottom: 14px solid transparent;
  border-left: 22px solid #111;
}

/* PRACTICE */

.practice-card {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.practice-toolbar {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  padding-top: 2px;
}

.segmented-control {
  display: inline-flex;
  gap: 8px;
  flex-wrap: wrap;
}

.segmented-btn {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: #181818;
  color: rgba(255, 255, 255, 0.78);
  height: 42px;
  padding: 0 18px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 0.95rem;
}

.segmented-btn.active {
  background: #262626;
  color: #fff;
  border-color: rgba(255, 255, 255, 0.14);
}

.practice-stage {
  background: transparent;
  border-radius: 24px;
  padding: 16px 4px 10px;
  overflow: hidden;
  min-height: 220px;
}

.practice-view {
  display: none;
  width: 100%;
}

.practice-view.active {
  display: block;
}

/* CHORD VIEW */

.chord-grid-row {
  width: 100%;
  display: flex;
  justify-content: flex-start;
  gap: 34px;
  align-items: flex-end;
  padding: 6px 0 2px;
}

.mini-chord {
  width: 138px;
  text-align: center;
  flex: 0 0 auto;
}

.mini-fretboard {
  height: 118px;
  border: 2px solid #8f8f8f;
  border-radius: 4px;
  position: relative;
  background:
    linear-gradient(to right,
      transparent 18%, #8f8f8f 18%, #8f8f8f 20%, transparent 20%,
      transparent 48%, #8f8f8f 48%, #8f8f8f 50%, transparent 50%,
      transparent 78%, #8f8f8f 78%, #8f8f8f 80%, transparent 80%),
    linear-gradient(to bottom,
      transparent 18%, #8f8f8f 18%, #8f8f8f 20%, transparent 20%,
      transparent 38%, #8f8f8f 38%, #8f8f8f 40%, transparent 40%,
      transparent 58%, #8f8f8f 58%, #8f8f8f 60%, transparent 60%,
      transparent 78%, #8f8f8f 78%, #8f8f8f 80%, transparent 80%);
}

.nut {
  position: absolute;
  left: 18px;
  top: -7px;
  width: 16px;
  height: 126px;
  border-radius: 8px;
  background: #8f8f8f;
}

.dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #8f8f8f;
  position: absolute;
}

.mini-label {
  display: block;
  margin-top: 8px;
  font-family: var(--font-secondary);
  color: #8f8f8f;
  font-size: 0.95rem;
}

/* TAB VIEW */

.tab-wrap {
  width: 100%;
  max-width: 100%;
  padding: 14px 0 8px;
  overflow: hidden;
}

.tab-line {
  height: 30px;
  border-top: 4px solid #f3f3f3;
  position: relative;
}

.tab-line:last-child {
  border-bottom: 4px solid #f3f3f3;
}

.tab-num {
  position: absolute;
  top: -22px;
  background: #000;
  color: white;
  font-family: var(--font-secondary);
  font-size: 0.98rem;
  padding: 0 5px;
  line-height: 1;
}

.tab-num.n1 { left: 18px; }
.tab-num.n2 { left: 74px; }
.tab-num.n3 { left: 120px; }
.tab-num.n4 { left: 180px; }
.tab-num.n5 { left: 250px; }
.tab-num.n6 { left: 328px; }
.tab-num.n7 { left: 392px; }
.tab-num.n8 { left: 470px; }
.tab-num.n9 { left: 548px; }
.tab-num.n10 { left: 610px; }

/* ACTIONS */

.lesson-actions {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
  padding-top: 4px;
}

.primary-btn,
.ghost-btn {
  height: 60px;
  border-radius: 999px;
  border: none;
  padding: 0 30px;
  cursor: pointer;
  font-weight: 700;
}

.primary-btn {
  min-width: 236px;
  background: var(--purple);
  color: white;
}

.ghost-btn {
  min-width: 210px;
  background: #1b1b1b;
  color: rgba(255, 255, 255, 0.92);
}

/* AI PANEL */

.ai-stage {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 8px 6px 0;
}

.speech-bubble {
  align-self: flex-end;
  max-width: 285px;
  background: #767676;
  color: white;
  padding: 22px 20px;
  border-radius: 28px 28px 28px 10px;
  font-size: 1rem;
  line-height: 1.3;
}

.mascot-image-wrap {
  width: 220px;
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.mascot-image {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.ai-input-wrap {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1fr 56px;
  align-items: center;
  background: #262626;
  border-radius: 999px;
  min-height: 60px;
  padding-left: 18px;
}

.ai-input {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 1rem;
}

.ai-input::placeholder {
  color: rgba(255, 255, 255, 0.28);
}

.send-btn {
  width: 46px;
  height: 46px;
  margin-right: 7px;
  border: none;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.18);
  position: relative;
  cursor: pointer;
}

.send-btn::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 16px;
  height: 18px;
  transform: translate(-50%, -50%);
  background: #2a2a2a;
  clip-path: polygon(50% 0, 100% 70%, 62% 70%, 62% 100%, 38% 100%, 38% 70%, 0 70%);
}

/* BOTTOM DOTS */

.bottom-dots {
  display: flex;
  gap: 10px;
  align-items: center;
  padding-left: 8px;
  flex: 0 0 auto;
}

.dot-color {
  width: 18px;
  height: 18px;
  border-radius: 50%;
}

.dot-color.blue { background: var(--blue); }
.dot-color.pink { background: var(--pink); }
.dot-color.green { background: var(--green); }
.dot-color.purple { background: var(--purple-2); }
.dot-color.yellow { background: var(--yellow); }

/* RESPONSIVE */

@media (max-width: 1280px) {
  body {
    overflow: auto;
  }

  .page-shell {
    height: auto;
    min-height: 100vh;
    overflow: visible;
  }

  .class-layout {
    grid-template-columns: 1fr;
  }

  .lesson-panel-scroll {
    overflow: visible;
    padding-right: 0;
  }

  .ai-card {
    min-height: 420px;
  }
}

@media (max-width: 860px) {
  .page-shell {
    padding: 18px 18px 18px;
  }

  .topbar {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .brand-wrap {
    justify-self: center;
  }

  .top-nav {
    gap: 24px;
    flex-wrap: wrap;
  }

  .brand-title {
    font-size: 2.6rem;
  }

  .brand-logo {
    width: 42px;
    height: 42px;
  }

  .video-placeholder {
    border-radius: 28px;
  }

  .lesson-actions {
    flex-wrap: wrap;
  }

  .chord-grid-row {
    gap: 18px;
    overflow-x: auto;
    padding-bottom: 6px;
  }

  .mini-chord {
    width: 120px;
  }

  .speech-bubble {
    max-width: 220px;
  }

  .tab-wrap {
    overflow-x: auto;
  }
}
</style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <h1 class="brand-title">ToneMap</h1>
        <img src="images/logo-tonemap.png" alt="Logo ToneMap" class="brand-logo" />
      </div>

      <nav class="top-nav">
        <a href="#">Inicio</a>
        <a href="#">Nosotros</a>
        <a href="#">Mi música</a>
        <a href="#" class="active">Curso</a>
      </nav>
    </header>

    <main class="class-layout">
      <!-- COLUMNA IZQUIERDA: ESTA SÍ HACE SCROLL -->
      <section class="lesson-panel-scroll">
        <section class="lesson-panel">
          <div class="video-card">
            <div class="video-placeholder">
              <button class="play-button" aria-label="Reproducir video">
                <span class="play-triangle"></span>
              </button>
            </div>
          </div>

          <div class="practice-card">
            <div class="practice-toolbar">
              <div class="segmented-control" id="viewTypeControl">
                <button class="segmented-btn active" data-view="chords">Gráficos</button>
                <button class="segmented-btn" data-view="tab">Tablatura</button>
              </div>
            </div>

            <div class="practice-stage">
              <!-- GRAFICOS -->
              <div class="practice-view active" id="view-chords">
                <div class="chord-grid-row">
                  <div class="mini-chord">
                    <div class="mini-fretboard">
                      <span class="nut"></span>
                      <span class="dot" style="left: 56px; top: 40px;"></span>
                      <span class="dot" style="left: 30px; top: 86px;"></span>
                      <span class="dot" style="left: 56px; top: 64px;"></span>
                    </div>
                    <span class="mini-label">5</span>
                  </div>

                  <div class="mini-chord">
                    <div class="mini-fretboard">
                      <span class="nut"></span>
                      <span class="dot" style="left: 58px; top: 38px;"></span>
                      <span class="dot" style="left: 32px; top: 62px;"></span>
                      <span class="dot" style="left: 58px; top: 88px;"></span>
                    </div>
                    <span class="mini-label">12</span>
                  </div>

                  <div class="mini-chord">
                    <div class="mini-fretboard">
                      <span class="nut"></span>
                      <span class="dot" style="left: 60px; top: 38px;"></span>
                      <span class="dot" style="left: 34px; top: 78px;"></span>
                    </div>
                    <span class="mini-label">3</span>
                  </div>

                  <div class="mini-chord">
                    <div class="mini-fretboard">
                      <span class="nut"></span>
                      <span class="dot" style="left: 56px; top: 72px;"></span>
                      <span class="dot" style="left: 56px; top: 95px;"></span>
                    </div>
                    <span class="mini-label">3</span>
                  </div>
                </div>
              </div>

              <!-- TABLATURA -->
              <div class="practice-view" id="view-tab">
                <div class="tab-wrap">
                  <div class="tab-line"><span class="tab-num n1">5</span><span class="tab-num n2">7</span></div>
                  <div class="tab-line"><span class="tab-num n1">5</span><span class="tab-num n2">7</span><span class="tab-num n3">8</span><span class="tab-num n9">5</span><span class="tab-num n10">7</span></div>
                  <div class="tab-line"><span class="tab-num n6">5</span><span class="tab-num n7">7</span><span class="tab-num n8">8</span></div>
                  <div class="tab-line"><span class="tab-num n5">5</span><span class="tab-num n6">7</span></div>
                  <div class="tab-line"><span class="tab-num n4">5</span><span class="tab-num n5">7</span><span class="tab-num n6">8</span></div>
                  <div class="tab-line"></div>
                </div>
              </div>
            </div>

            <div class="lesson-actions">
              <button class="primary-btn">Reproducir</button>
              <button class="ghost-btn">Siguiente clase</button>
            </div>
          </div>
        </section>
      </section>

      <!-- COLUMNA DERECHA: FIJA -->
      <aside class="ai-card">
        <div class="ai-stage">
          <div class="speech-bubble" id="speechBubble">
            ¿Tienes alguna duda?
          </div>

          <div class="mascot-image-wrap">
            <img src="images/tone-mascot.png" alt="Mascota Tone" class="mascot-image" />
          </div>
        </div>

        <div class="ai-input-wrap">
          <input
            type="text"
            placeholder="Tone — tu guía musical"
            class="ai-input"
          />
          <button class="send-btn" aria-label="Enviar"></button>
        </div>
      </aside>
    </main>

    <div class="bottom-dots">
      <span class="dot-color blue"></span>
      <span class="dot-color pink"></span>
      <span class="dot-color green"></span>
      <span class="dot-color purple"></span>
      <span class="dot-color yellow"></span>
    </div>
  </div>

  <script>
    const viewButtons = document.querySelectorAll("#viewTypeControl .segmented-btn");
const viewPanels = {
  chords: document.getElementById("view-chords"),
  tab: document.getElementById("view-tab")
};

viewButtons.forEach((btn) => {
  btn.addEventListener("click", () => {
    viewButtons.forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");

    const selectedView = btn.dataset.view;

    Object.values(viewPanels).forEach((panel) => {
      panel.classList.remove("active");
    });

    if (viewPanels[selectedView]) {
      viewPanels[selectedView].classList.add("active");
    }
  });
});
  </script>
</body>
</html>
